# Глоссарий доменных сокращений → официальные термины
# Используется для детерминированного расширения запросов перед RAG-агентами.
#
# Формат: "неофициальный термин (lowercase)" → official: "официальное название"
# Поиск — case-insensitive подстрока в запросе пользователя.
# При совпадении к запросу дописывается: (официально: <official>)
#
# Добавляйте новые термины по мере обнаружения.

terms:
  # Постановление Правительства РФ № 2464 — программы обучения по охране труда
  "программа а":
    official: "программа обучения по общим вопросам охраны труда и функционирования системы управления охраной труда"
    source: "Постановление 2464, п. 46"

  "программа б":
    official: "программа обучения безопасным методам и приёмам выполнения работ при воздействии вредных и (или) опасных производственных факторов, источников опасности"
    source: "Постановление 2464, п. 46"

  "программа в":
    official: "программа обучения безопасным методам и приёмам выполнения работ повышенной опасности"
    source: "Постановление 2464, п. 46"

  # Группы по электробезопасности
  "группа i по электробезопасности":
    official: "I группа по электробезопасности — неэлектротехнический персонал"
    source: "Правила по охране труда при эксплуатации электроустановок"

  "группа ii по электробезопасности":
    official: "II группа по электробезопасности — электротехнологический персонал"
    source: "Правила по охране труда при эксплуатации электроустановок"

  # Распространённые аббревиатуры
  "суот":
    official: "система управления охраной труда"

  "соут":
    official: "специальная оценка условий труда"

  "сиз":
    official: "средства индивидуальной защиты"

  "дсиз":
    official: "дерматологические средства индивидуальной защиты"

  "впф":
    official: "вредные производственные факторы"

  "опф":
    official: "опасные производственные факторы"
